services:
  whisper-api:
    container_name: whisper-api
    build: .
    ports:
      - "3443:8000"
    env_file:
      - .env
    environment:
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-1}
    volumes:
      - ./models:/root/.cache/huggingface # Cache models so they don't redownload
    restart: unless-stopped
